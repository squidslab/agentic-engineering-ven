clone_repo_task:
  description: >
    Clone the GitHub repository at {repo_url} into the local directory ./cloned_repo.
    Use the "Clone GitHub Repository" tool with repo_url={repo_url}.
    Report whether the clone was successful or not.
  expected_output: >
    A confirmation message that the repository was cloned successfully,
    including the local path where it was saved.
  agent: repo_cloner

smell_analysis_task:
  description: >
    Analyze the repository located at ./cloned_repo for potential code smells.

    Follow these steps in ORDER:
    1. Use the "List Repository Files" tool to get the list of all source files.
    2. For EACH file listed, use the "Read Repository File" tool to read its content.
    3. After reading each file, identify any code smells present.

    For each code smell found:
    - File name (exact)
    - Class name
    - Method name and a short quote of the problematic code
    - Explanation of WHY it is a smell

    Do NOT invent or guess file names or code. Only report what you actually read.

  expected_output: >
    A detailed list of identified code smells, including the file name, class name, method, and explanation for each. The output should be formatted in markdown without '```'.
  agent: code_smell_analyzer

report_generation_task:
  description: >
    Generate a comprehensive report based on the code smell analysis results
    provided by the previous task. Synthetize the findings into clear, actionable
    insights with suggested refactoring strategies.
  expected_output: >
    A well-structured markdown report summarizing all code smells found,
    grouped by severity or type, with refactoring suggestions. No code fences.
  agent: report_generator
